<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />

		<!-- yap in english, hear it in slovenščina -->
		<meta
			name="description"
			content="Yap in English, hear it back in Slovenian. English speech-to-text → Slovenian text-to-speech, no cap."
		/>

		<!-- Link previews (iMessage, Slack, socials) -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="Slovenglish" />
		<meta
			property="og:description"
			content="Yap in English, hear it back in Slovenian. Speech-to-text in, text-to-speech out."
		/>
		<meta property="og:image" content="/icon-512.png" />
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="Slovenglish" />
		<meta
			name="twitter:description"
			content="Yap in English, hear it back in Slovenian. Speech-to-text in, text-to-speech out."
		/>
		<meta name="twitter:image" content="/icon-512.png" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>

		<link rel="manifest" href="/manifest.webmanifest" />
		<meta name="theme-color" content="#0f172a" />

		<!-- iOS drives Add to Home Screen from these, not from the manifest. -->
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-title" content="Slovenglish" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
